<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Aprendendo</title>
</head>
<body>
    <h1>Breno Pimentel</h1>
    <section class="calculator">
        <input type="text">
        <section class="keyboard">
            <button>AC</button>
            <button>C</button>
            <button>:</button>
            <button>x</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="result">=</button>
            <button class="zero">0</button>
            <button>.</button>
        </section>
    </section>
</body>
</html>
